<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAFT ROOM</title>
    <!-- Google Fonts for Styling Variations Restored -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1a1a1e;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --border-color: #2a2a32;
            --font-size: 16px;
            --font-family: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            font-size: var(--font-size);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Header */
        header {
            background-color: var(--panel-bg);
            border-bottom: 2px solid var(--border-color);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 1.2rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #ff3e3e;
            border-radius: 2px;
        }

        /* Subtle Mode Indicator Staged Centered */
        .mode-status-indicator {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #71717a;
            text-transform: uppercase;
            background: var(--bg-color);
            padding: 6px 14px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .control-btn {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .control-btn:hover {
            background-color: var(--border-color);
        }

        /* Workspace Layout */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Collapsible Settings Panel Sidebar */
        .settings-sidebar {
            width: 290px;
            background-color: var(--panel-bg);
            border-right: 2px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .settings-sidebar.collapsed {
            margin-left: -290px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-group label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #71717a;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
        }

        .setting-group select {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
        }

        /* Custom System Color Layout Block */
        .color-picker-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .color-picker-wrapper input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 38px;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
        }

        .color-picker-wrapper input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-picker-wrapper input[type="color"]::-webkit-color-swatch {
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .zoom-controls {
            display: flex;
            gap: 8px;
        }

        .zoom-controls button {
            flex: 1;
            padding: 8px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
        }

        /* Internal Saved Drafts Sliding Drawer Panel Overlay */
        .drafts-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 100%;
            background-color: var(--panel-bg);
            border-right: 2px solid var(--border-color);
            z-index: 50;
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
        }

        .drafts-panel.open {
            transform: translateX(0);
        }

        .drafts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .drafts-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .draft-item {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: border-color 0.2s;
        }

        .draft-item:hover {
            border-color: var(--accent-color);
        }

        .draft-item-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .draft-item-meta {
            font-size: 0.75rem;
            color: #71717a;
            display: flex;
            justify-content: space-between;
        }

        .draft-delete-btn {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Editor Wrapper Container */
        .editor-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            justify-content: center;
            background-color: var(--bg-color);
            position: relative;
            transition: background-color 0.3s ease;
        }

        .editor-paper {
            width: 100%;
            max-width: 850px;
            min-height: 100%;
            position: relative;
            outline: none;
            padding-bottom: 200px;
            line-height: 1.5;
        }

        /* LYRICS, RANDOM AND CODE MODE */
        .editor-paper.mode-lyrics, .editor-paper.mode-random, .editor-paper.mode-code {
            white-space: pre-wrap;
        }

        /* Special Engine Modifications for Code Canvas Matrix */
        .editor-paper.mode-code {
            font-family: 'JetBrains Mono', monospace !important;
        }

        /* Inline Syntax Highlighting Tokens (GitHub Dark Inspired Matrix) */
        .code-keyword { color: #ff7b72; font-weight: bold; }
        .code-string { color: #a5d6ff; }
        .code-number { color: #79c0ff; }
        .code-function { color: #d2a8ff; }
        .code-comment { color: #8b949e; font-style: italic; }
        .code-bracket { color: #ffa657; }

        /* A/V MODE (Split Layout Table) */
        .av-container {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 10px;
        }

        .av-row {
            display: flex;
            border: 1px solid var(--border-color);
            background: var(--panel-bg);
            border-radius: 6px;
        }

        .av-cell {
            flex: 1;
            padding: 15px;
            min-height: 100px;
            outline: none;
            border-right: 1px solid var(--border-color);
            line-height: 1.5;
        }

        .av-cell:last-child {
            border-right: none;
        }

        .av-header-row {
            display: flex;
            background: var(--border-color);
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 6px 6px 0 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        .av-header-cell {
            flex: 1;
            padding: 10px 15px;
            color: #a1a1aa;
        }

        .add-row-btn {
            align-self: flex-start;
            margin-top: 10px;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* SCREENPLAY MODE (Styled Dark inside App) */
        .editor-paper.mode-screenplay {
            font-family: 'Courier Prime', monospace !important;
            max-width: 750px;
            padding: 60px 80px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            min-height: 11in;
        }

        /* Custom Right-Click Menu Styles */
        .custom-context-menu {
            position: absolute;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            padding: 6px 0;
            display: none;
            z-index: 1000;
            width: 180px;
        }

        .menu-item {
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
        }

        .menu-item:hover {
            background-color: var(--border-color);
        }

        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Inline structural styling tags injected dynamically */
        .section-tag {
            display: block;
            font-weight: bold;
            color: #ff3e3e;
            text-transform: uppercase;
            margin-top: 16px;
            margin-bottom: 4px;
            letter-spacing: 1px;
            font-family: 'Inter', sans-serif;
        }

        /* Print Settings to force pure PDF layouts */
        @media print {
            body, .editor-container, .workspace {
                background: white !important;
                color: black !important;
                overflow: visible !important;
                height: auto !important;
            }
            header, .settings-sidebar, .drafts-panel, .custom-context-menu, .add-row-btn, .control-btn {
                display: none !important;
            }
            .editor-container {
                padding: 0 !important;
            }
            .editor-paper {
                box-shadow: none !important;
                padding: 0 !important;
                max-width: 100% !important;
            }
            .editor-paper.mode-screenplay {
                color: #111111 !important;
                background: #ffffff !important;
                padding: 0 !important;
            }
            .av-row {
                page-break-inside: avoid;
                border: 1px solid #000000 !important;
                background: white !important;
            }
            .av-cell {
                border-right: 1px solid #000000 !important;
                color: black !important;
            }
            .av-header-row {
                background: #eeeeee !important;
            }
            .av-header-cell {
                color: black !important;
            }
        }
    </style>
</head>
<body>

    <!-- Header Control Bar -->
    <header>
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="control-btn" id="globalSidebarToggle" onclick="toggleSidebar()" style="font-size:1.15rem; padding: 6px 12px;" title="Toggle Sidebar Panel">☰</button>
            <button class="control-btn" onclick="toggleDraftsPanel()" style="font-size: 0.85rem;" title="Open Saved Drafts Matrix">🗂️ Saved Drafts</button>
            <button class="control-btn" onclick="triggerNewDraftFlow()" style="font-size: 0.85rem; font-weight: 700; border-color: var(--accent-color);" title="Instantiate Blank Workspace Layout">+ New Draft</button>
            <div class="brand" style="margin-left: 8px;">DRAFT ROOM</div>
        </div>
        
        <!-- Subtle Non-Intrusive Engine Status Indicator -->
        <div class="mode-status-indicator" id="headerModeIndicator">[ Lyrics Active ]</div>

        <div class="actions">
            <button class="control-btn" onclick="exportTXT()">Export TXT</button>
            <button class="control-btn" onclick="exportPDF()">Export PDF</button>
        </div>
    </header>

    <!-- Main Dynamic Workspace Structure -->
    <div class="workspace">
        
        <!-- Internal Saved Drafts Drawer Architecture -->
        <div class="drafts-panel" id="draftsPanel">
            <div class="drafts-header">
                <span>SAVED DRAFTS</span>
                <button class="control-btn" style="padding: 4px 8px;" onclick="toggleDraftsPanel()">✕</button>
            </div>
            <div class="drafts-list" id="draftsListContainer">
                <!-- Dynamically populated via local state mappings -->
            </div>
        </div>

        <!-- Workspace Customization Sidebar Controls -->
        <aside class="settings-sidebar" id="sidebarPanel">
            <div class="setting-group">
                <label>Typography</label>
                <select id="fontFamilySelect" onchange="updateFontFamily(this.value)">
                    <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
                    <option value="'Courier Prime', monospace">Courier Prime</option>
                    <option value="'Inter', sans-serif">Inter Standard</option>
                    <option value="'Space Grotesk', sans-serif">Space Grotesk</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Scaling</label>
                <div class="zoom-controls">
                    <button onclick="adjustZoom(-1)">A-</button>
                    <button onclick="adjustZoom(1)">A+</button>
                </div>
            </div>

            <div class="setting-group">
                <label>Canvas Environment</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="bgColorPicker" value="#121214" oninput="applyColorChange('bg', this.value)">
                </div>
            </div>

            <div class="setting-group">
                <label>Text Foundation</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="textColorPicker" value="#e2e8f0" oninput="applyColorChange('text', this.value)">
                </div>
            </div>
            
            <div class="setting-group">
                <label>Panel Interface</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="panelColorPicker" value="#1a1a1e" oninput="applyColorChange('panel', this.value)">
                </div>
            </div>
        </aside>

        <!-- Dynamic Output Editor Canvas -->
        <div class="editor-container" id="editorContainer">
            
            <!-- Standard Continuous Contenteditable Canvas -->
            <div class="editor-paper mode-lyrics" id="editor" contenteditable="true" spellcheck="false"></div>

            <!-- Integrated Structural A/V Double Columns Node -->
            <div class="av-container" id="avContainer">
                <div class="av-header-row">
                    <div class="av-header-cell">Visual Execution</div>
                    <div class="av-header-cell">Audio Narrative / Blueprint</div>
                </div>
                <div id="avRowsWrapper">
                    <div class="av-row">
                        <div class="av-cell" contenteditable="true" spellcheck="false"></div>
                        <div class="av-cell" contenteditable="true" spellcheck="false"></div>
                    </div>
                </div>
                <button class="control-btn add-row-btn" onclick="addAVRow()">+ Append Timeline Row</button>
            </div>

        </div>
    </div>

    <!-- Right-Click Context Menu for Structural Text Highlighting Colors -->
    <div class="custom-context-menu" id="contextMenu">
        <div class="menu-item" onclick="applyHighlight('#ffffff')">
            <div class="color-dot" style="background: #ffffff;"></div> Default
        </div>
        <div class="menu-item" onclick="applyHighlight('#ff4444')">
            <div class="color-dot" style="background: #ff4444;"></div> Structural Red
        </div>
        <div class="menu-item" onclick="applyHighlight('#3b82f6')">
            <div class="color-dot" style="background: #3b82f6;"></div> Cadence Blue
        </div>
        <div class="menu-item" onclick="applyHighlight('#eab308')">
            <div class="color-dot" style="background: #eab308;"></div> Chorus Gold
        </div>
        <div class="menu-item" onclick="applyHighlight('#22c55e')">
            <div class="color-dot" style="background: #22c55e;"></div> Hook Emerald
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const avContainer = document.getElementById('avContainer');
        const avRowsWrapper = document.getElementById('avRowsWrapper');
        const contextMenu = document.getElementById('contextMenu');
        const sidebarPanel = document.getElementById('sidebarPanel');
        const draftsPanel = document.getElementById('draftsPanel');
        const draftsListContainer = document.getElementById('draftsListContainer');
        const headerModeIndicator = document.getElementById('headerModeIndicator');
        
        let currentMode = 'Lyrics';
        let currentZoom = 16;
        let autosaveTimeout = null;
        let activeDraftId = null;
        let isColoringCode = false; // Mutex flag preventing input update infinite loop traps

        const STORAGE_KEYS = {
            Lyrics: 'draftroom_lyrics_content',
            'A/V': 'draftroom_av_content',
            Screenplay: 'draftroom_screenplay_content',
            Random: 'draftroom_random_content',
            Code: 'draftroom_code_content',
            Theme: 'draftroom_theme_config',
            Font: 'draftroom_font_config',
            DraftsIndex: 'draftroom_internal_manifest'
        };

        const VALID_COMMANDS = ['/verse', '/chorus', '/hook', '/bridge', '/intro', '/outro', '/pre-chorus'];

        window.addEventListener('DOMContentLoaded', () => {
            loadThemeSettings();
            loadFontSetting();
            loadContent(currentMode);
            setupEditorListeners();
            setupContextMenu();
            renderDraftsList();
            setupGlobalShortcuts();
            updateHeaderModeIndicator();
        });

        function setupEditorListeners() {
            // Shift + Enter Content-Escape Matrix Listener Core
            editor.addEventListener('keydown', (e) => {
                if (e.shiftKey && e.key === 'Enter') {
                    const selection = window.getSelection();
                    if (!selection.rangeCount) return;

                    let rangeNode = selection.getRangeAt(0).startContainer;
                    while (rangeNode && rangeNode !== editor) {
                        if (rangeNode.nodeName === 'A') {
                            e.preventDefault();
                            const escapeBreakDiv = document.createElement('div');
                            escapeBreakDiv.innerHTML = '<br>';
                            rangeNode.parentNode.insertBefore(escapeBreakDiv, rangeNode.nextSibling);
                            
                            const newSelectionRange = document.createRange();
                            newSelectionRange.setStart(escapeBreakDiv, 0);
                            newSelectionRange.collapse(true);
                            selection.removeAllRanges();
                            selection.addRange(newSelectionRange);
                            
                            triggerAutosave();
                            return;
                        }
                        rangeNode = rangeNode.parentNode;
                    }
                }

                // Code Mode Engineering Input Hooks (Tab Indentation + Auto brackets closing)
                if (currentMode === 'Code') {
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        document.execCommand('insertText', false, '    ');
                    }
                    
                    const openClosePairs = { '{': '}', '(': ')', '[': ']', '"': '"', "'": "'" };
                    if (openClosePairs[e.key] !== undefined) {
                        e.preventDefault();
                        const matchingClosingChar = openClosePairs[e.key];
                        const cursorSelection = window.getSelection();
                        const cursorRange = cursorSelection.getRangeAt(0);
                        
                        const bracketContainerSpan = document.createElement('span');
                        bracketContainerSpan.innerText = e.key + matchingClosingChar;
                        cursorRange.insertNode(bracketContainerSpan);
                        
                        // Shift cursor focus backwards inside the generated elements bounds
                        cursorRange.setStart(bracketContainerSpan.firstChild, 1);
                        cursorRange.collapse(true);
                        cursorSelection.removeAllRanges();
                        cursorSelection.addRange(cursorRange);
                        triggerAutosave();
                    }
                }
            });

            editor.addEventListener('input', () => {
                triggerAutosave();
                if (currentMode === 'Lyrics') {
                    processSlashCommands();
                }
                if (currentMode === 'Code' && !isColoringCode) {
                    processSyntaxHighlighting();
                }
            });

            avContainer.addEventListener('input', () => {
                triggerAutosave();
            });

            editor.addEventListener('keydown', (e) => {
                if (currentMode === 'Screenplay' && e.key === 'Tab') {
                    e.preventDefault();
                    handleScreenplayFormatting();
                }
            });
        }

        function setupGlobalShortcuts() {
            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
                    e.preventDefault();
                    promptSaveDraft();
                }
            });
        }

        function toggleSidebar() {
            sidebarPanel.classList.toggle('collapsed');
        }

        function toggleDraftsPanel() {
            draftsPanel.classList.toggle('open');
            if (draftsPanel.classList.contains('open')) {
                renderDraftsList();
            }
        }

        function triggerAutosave() {
            clearTimeout(autosaveTimeout);
            autosaveTimeout = setTimeout(() => {
                saveContent(currentMode);
                if (activeDraftId) {
                    saveActiveDraftSilently();
                }
            }, 300); 
        }

        function triggerNewDraftFlow() {
            const rawChoice = prompt("Select dynamic blueprint layout structure type:\n1 = Lyrics\n2 = A/V\n3 = Screenplay\n4 = Random\n5 = Code", "1");
            if (rawChoice === null) return;

            let targetMode = "Lyrics";
            if (rawChoice === "2") targetMode = "A/V";
            else if (rawChoice === "3") targetMode = "Screenplay";
            else if (rawChoice === "4") targetMode = "Random";
            else if (rawChoice === "5") targetMode = "Code";

            activeDraftId = null; 
            currentMode = targetMode;

            executeCanvasResetLayout(targetMode);
        }

        function executeCanvasResetLayout(selectedMode) {
            editor.className = 'editor-paper';
            editor.style.display = 'block';
            avContainer.style.display = 'none';

            const storedTheme = JSON.parse(localStorage.getItem(STORAGE_KEYS.Theme) || '{}');
            document.documentElement.style.setProperty('--bg-color', storedTheme.bg || '#121214');
            document.documentElement.style.setProperty('--text-color', storedTheme.text || '#e2e8f0');

            if (selectedMode === 'Lyrics') {
                editor.classList.add('mode-lyrics');
                editor.innerHTML = '<div></div>';
            } else if (selectedMode === 'A/V') {
                editor.style.display = 'none';
                avContainer.style.display = 'flex';
                avRowsWrapper.innerHTML = '';
                addAVRow();
            } else if (selectedMode === 'Screenplay') {
                editor.classList.add('mode-screenplay');
                editor.innerHTML = '<div>INT. SCENE HEADLINE - DAY</div><div></div>';
            } else if (selectedMode === 'Random') {
                editor.classList.add('mode-random');
                editor.innerHTML = '<div></div>';
            } else if (selectedMode === 'Code') {
                editor.classList.add('mode-code');
                editor.innerHTML = '<div></div>';
            }

            updateHeaderModeIndicator();
            saveContent(selectedMode);
        }

        function updateHeaderModeIndicator() {
            headerModeIndicator.innerText = `[ ${currentMode} Active ]`;
        }

        function switchMode(selectedMode) {
            saveContent(currentMode);
            currentMode = selectedMode;
            activeDraftId = null;

            editor.className = 'editor-paper';
            editor.style.display = 'block';
            avContainer.style.display = 'none';

            const storedTheme = JSON.parse(localStorage.getItem(STORAGE_KEYS.Theme) || '{}');
            document.documentElement.style.setProperty('--bg-color', storedTheme.bg || '#121214');
            document.documentElement.style.setProperty('--text-color', storedTheme.text || '#e2e8f0');

            if (selectedMode === 'Lyrics') {
                editor.classList.add('mode-lyrics');
                loadContent('Lyrics');
            } else if (selectedMode === 'A/V') {
                editor.style.display = 'none';
                avContainer.style.display = 'flex';
                loadContent('A/V');
            } else if (selectedMode === 'Screenplay') {
                editor.classList.add('mode-screenplay');
                loadContent('Screenplay');
            } else if (selectedMode === 'Random') {
                editor.classList.add('mode-random');
                loadContent('Random');
            } else if (selectedMode === 'Code') {
                editor.classList.add('mode-code');
                loadContent('Code');
                processSyntaxHighlighting();
            }
            updateHeaderModeIndicator();
        }

        // Lightweight Real-time Real Web Dev Engineering Syntax Highlighting Module
        function processSyntaxHighlighting() {
            isColoringCode = true;
            const currentSelection = window.getSelection();
            if (!currentSelection.rangeCount) { isColoringCode = false; return; }

            // Document text offsets mapping context calculations to hold caret positions solid
            const savedCaretOffset = getCaretCharacterOffsetWithin(editor);
            let rawCodeString = editor.innerText;

            // Protection fallback layer matrix mapping HTML entities safely inside strings
            rawCodeString = rawCodeString.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // Precision RegEx Structural Parsers mapping official GitHub color distributions
            const keywordRegex = /\b(const|let|var|function|return|class|extends|if|else|for|while|switch|case|break|import|export|from|new|this|async|await)\b/g;
            const stringRegex = /(["'`])(.*?)\1/g;
            const numberRegex = /\b(\d+)\b/g;
            const functionRegex = /\b([a-zA-Z_]\w*)(?=\()/g;
            const commentRegex = /(\/\/.*)/g;
            const bracketRegex = /([{}()\[\]])/g;

            let compiledHtml = rawCodeString
                .replace(bracketRegex, '<span class="code-bracket">$1</span>')
                .replace(keywordRegex, '<span class="code-keyword">$1</span>')
                .replace(numberRegex, '<span class="code-number">$1</span>')
                .replace(functionRegex, '<span class="code-function">$1</span>')
                .replace(stringRegex, '<span class="code-string">$1$2$1</span>')
                .replace(commentRegex, '<span class="code-comment">$1</span>');

            // Force internal text formatting swap mapping modifications
            editor.innerHTML = compiledHtml;

            // Execute matrix position restoration pipeline to prevent formatting drops
            setCaretPositionWithin(editor, savedCaretOffset);
            isColoringCode = false;
        }

        function getCaretCharacterOffsetWithin(element) {
            let caretOffset = 0;
            const doc = element.ownerDocument || element.document;
            const win = doc.defaultView || doc.parentWindow;
            const sel = win.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const preCaretRange = range.cloneRange();
                preCaretRange.selectNodeContents(element);
                preCaretRange.setEnd(range.endContainer, range.endOffset);
                caretOffset = preCaretRange.toString().length;
            }
            return caretOffset;
        }

        function setCaretPositionWithin(element, offset) {
            let charIndex = 0;
            const range = document.createRange();
            range.setStart(element, 0);
            range.collapse(true);
            
            const nodeQueue = [element];
            let currentNode;
            let found = false;

            while (nodeQueue.length > 0 && !found) {
                currentNode = nodeQueue.shift();
                if (currentNode.nodeType === 3) {
                    const nextCharIndex = charIndex + currentNode.length;
                    if (offset >= charIndex && offset <= nextCharIndex) {
                        range.setStart(currentNode, offset - charIndex);
                        range.collapse(true);
                        found = true;
                    }
                    charIndex = nextCharIndex;
                } else {
                    let i = currentNode.childNodes.length;
                    while (i--) {
                        nodeQueue.unshift(currentNode.childNodes[i]);
                    }
                }
            }

            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }

        function processSlashCommands() {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            const lines = editor.innerText.split('\n');

            for (let i = 0; i < lines.length; i++) {
                let currentLineText = lines[i].trim();

                if (VALID_COMMANDS.includes(currentLineText.toLowerCase())) {
                    const matchedTag = currentLineText.substring(1).toUpperCase();
                    const range = selection.getRangeAt(0);
                    const textNode = range.startContainer;
                    
                    if (textNode.nodeType === Node.TEXT_NODE) {
                        const rawStringValue = textNode.nodeValue;
                        for (let command of VALID_COMMANDS) {
                            if (rawStringValue.toLowerCase().includes(command)) {
                                textNode.nodeValue = ''; 
                                const tagHtml = `<span class="section-tag" contenteditable="false">[${matchedTag}]</span><div><br></div>`;
                                document.execCommand('insertHTML', false, tagHtml);
                                triggerAutosave();
                                return;
                            }
                        }
                    }
                }
            }
        }

        function handleScreenplayFormatting() {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            let containerElement = selection.getRangeAt(0).startContainer;
            while (containerElement.nodeType !== Node.ELEMENT_NODE) {
                containerElement = containerElement.parentNode;
            }

            const currentMargin = containerElement.style.marginLeft;

            if (currentMargin === '' || currentMargin === '0px') {
                containerElement.style.marginLeft = '40%';
                containerElement.style.marginRight = '10%';
                containerElement.style.textTransform = 'uppercase';
            } else if (currentMargin === '40%') {
                containerElement.style.marginLeft = '20%';
                containerElement.style.marginRight = '20%';
                containerElement.style.textTransform = 'none';
            } else if (currentMargin === '20%') {
                containerElement.style.marginLeft = '0px';
                containerElement.style.marginRight = '0px';
                containerElement.style.textTransform = 'uppercase';
            }
            triggerAutosave();
        }

        function addAVRow() {
            const newRow = document.createElement('div');
            newRow.className = 'av-row';
            newRow.innerHTML = `
                <div class="av-cell" contenteditable="true" spellcheck="false"></div>
                <div class="av-cell" contenteditable="true" spellcheck="false"></div>
            `;
            avRowsWrapper.appendChild(newRow);
            triggerAutosave();
        }

        function saveContent(mode) {
            if (mode === 'A/V') {
                const rowsData = [];
                document.querySelectorAll('#avRowsWrapper .av-row').forEach(row => {
                    const cells = row.querySelectorAll('.av-cell');
                    rowsData.push({
                        visual: cells[0].innerHTML,
                        audio: cells[1].innerHTML
                    });
                });
                localStorage.setItem(STORAGE_KEYS['A/V'], JSON.stringify(rowsData));
            } else {
                localStorage.setItem(STORAGE_KEYS[mode], editor.innerHTML);
            }
        }

        function loadContent(mode) {
            const storedData = localStorage.getItem(STORAGE_KEYS[mode]);
            
            if (mode === 'A/V') {
                avRowsWrapper.innerHTML = '';
                if (storedData) {
                    const parsedRows = JSON.parse(storedData);
                    if (parsedRows.length > 0) {
                        parsedRows.forEach(rowData => {
                            const row = document.createElement('div');
                            row.className = 'av-row';
                            row.innerHTML = `
                                <div class="av-cell" contenteditable="true" spellcheck="false">${rowData.visual}</div>
                                <div class="av-cell" contenteditable="true" spellcheck="false">${rowData.audio}</div>
                            `;
                            avRowsWrapper.appendChild(row);
                        });
                        return;
                    }
                }
                addAVRow();
            } else {
                editor.innerHTML = storedData || (mode === 'Screenplay' ? '<div>INT. SCENE HEADLINE - DAY</div><div></div>' : '<div></div>');
            }
        }

        function promptSaveDraft() {
            let manifest = JSON.parse(localStorage.getItem(STORAGE_KEYS.DraftsIndex) || '[]');
            let existingName = "";
            
            if (activeDraftId) {
                const activeRecord = manifest.find(d => d.id === activeDraftId);
                if (activeRecord) existingName = activeRecord.title;
            }

            const titleInput = prompt("Enter a title for this file layout script:", existingName || "Untitled Composition");
            if (titleInput === null || titleInput.trim() === "") return;

            let currentPayload = "";
            if (currentMode === 'A/V') {
                const rowsData = [];
                document.querySelectorAll('#avRowsWrapper .av-row').forEach(row => {
                    const cells = row.querySelectorAll('.av-cell');
                    rowsData.push({ visual: cells[0].innerHTML, audio: cells[1].innerHTML });
                });
                currentPayload = JSON.stringify(rowsData);
            } else {
                currentPayload = editor.innerHTML;
            }

            if (activeDraftId) {
                manifest = manifest.map(d => {
                    if (d.id === activeDraftId) {
                        d.title = titleInput.trim();
                        d.timestamp = new Date().toLocaleString();
                        d.payload = currentPayload;
                    }
                    return d;
                });
            } else {
                const uniqueId = 'draft_' + Date.now();
                manifest.push({
                    id: uniqueId,
                    title: titleInput.trim(),
                    mode: currentMode,
                    timestamp: new Date().toLocaleString(),
                    payload: currentPayload
                });
                activeDraftId = uniqueId;
            }

            localStorage.setItem(STORAGE_KEYS.DraftsIndex, JSON.stringify(manifest));
            renderDraftsList();
        }

        function saveActiveDraftSilently() {
            let manifest = JSON.parse(localStorage.getItem(STORAGE_KEYS.DraftsIndex) || '[]');
            let currentPayload = "";
            
            if (currentMode === 'A/V') {
                const rowsData = [];
                document.querySelectorAll('#avRowsWrapper .av-row').forEach(row => {
                    const cells = row.querySelectorAll('.av-cell');
                    rowsData.push({ visual: cells[0].innerHTML, audio: cells[1].innerHTML });
                });
                currentPayload = JSON.stringify(rowsData);
            } else {
                currentPayload = editor.innerHTML;
            }

            manifest = manifest.map(d => {
                if (d.id === activeDraftId) {
                    d.payload = currentPayload;
                    d.timestamp = new Date().toLocaleString();
                }
                return d;
            });
            localStorage.setItem(STORAGE_KEYS.DraftsIndex, JSON.stringify(manifest));
        }

        function renderDraftsList() {
            const manifest = JSON.parse(localStorage.getItem(STORAGE_KEYS.DraftsIndex) || '[]');
            draftsListContainer.innerHTML = "";

            if (manifest.length === 0) {
                draftsListContainer.innerHTML = `<div style="text-align:center; color:#71717a; margin-top:20px; font-size:0.85rem;">No internal files saved yet.</div>`;
                return;
            }

            manifest.reverse().forEach(draft => {
                const draftItem = document.createElement('div');
                draftItem.className = 'draft-item';
                if (activeDraftId === draft.id) draftItem.style.borderColor = 'var(--accent-color)';
                
                draftItem.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="draft-item-title">${draft.title}</span>
                        <button class="draft-delete-btn" onclick="deleteDraft(event, '${draft.id}')">✕</button>
                    </div>
                    <div class="draft-item-meta">
                        <span style="color: var(--accent-color); font-weight:500;">${draft.mode}</span>
                        <span>${draft.timestamp.split(',')[0]}</span>
                    </div>
                `;
                draftItem.addEventListener('click', () => loadDraftWorkspace(draft.id));
                draftsListContainer.appendChild(draftItem);
            });
        }

        function loadDraftWorkspace(id) {
            const manifest = JSON.parse(localStorage.getItem(STORAGE_KEYS.DraftsIndex) || '[]');
            const targetedRecord = manifest.find(d => d.id === id);
            if (!targetedRecord) return;

            activeDraftId = targetedRecord.id;
            currentMode = targetedRecord.mode;

            editor.className = 'editor-paper';
            editor.style.display = 'block';
            avContainer.style.display = 'none';

            const storedTheme = JSON.parse(localStorage.getItem(STORAGE_KEYS.Theme) || '{}');
            document.documentElement.style.setProperty('--bg-color', storedTheme.bg || '#121214');
            document.documentElement.style.setProperty('--text-color', storedTheme.text || '#e2e8f0');

            if (currentMode === 'Lyrics') {
                editor.classList.add('mode-lyrics');
                editor.innerHTML = targetedRecord.payload;
            } else if (currentMode === 'A/V') {
                editor.style.display = 'none';
                avContainer.style.display = 'flex';
                avRowsWrapper.innerHTML = '';
                const parsedRows = JSON.parse(targetedRecord.payload);
                parsedRows.forEach(rowData => {
                    const row = document.createElement('div');
                    row.className = 'av-row';
                    row.innerHTML = `
                        <div class="av-cell" contenteditable="true" spellcheck="false">${rowData.visual}</div>
                        <div class="av-cell" contenteditable="true" spellcheck="false">${rowData.audio}</div>
                    `;
                    avRowsWrapper.appendChild(row);
                });
            } else if (currentMode === 'Screenplay') {
                editor.classList.add('mode-screenplay');
                editor.innerHTML = targetedRecord.payload;
            } else if (currentMode === 'Random') {
                editor.classList.add('mode-random');
                editor.innerHTML = targetedRecord.payload;
            } else if (currentMode === 'Code') {
                editor.classList.add('mode-code');
                editor.innerHTML = targetedRecord.payload;
                processSyntaxHighlighting();
            }
            
            toggleDraftsPanel();
            updateHeaderModeIndicator();
            saveContent(currentMode);
        }

        function deleteDraft(event, id) {
            event.stopPropagation();
            if (!confirm("Confirm complete deletion of this saved script?")) return;
            
            let manifest = JSON.parse(localStorage.getItem(STORAGE_KEYS.DraftsIndex) || '[]');
            manifest = manifest.filter(d => d.id !== id);
            localStorage.setItem(STORAGE_KEYS.DraftsIndex, JSON.stringify(manifest));
            
            if (activeDraftId === id) activeDraftId = null;
            renderDraftsList();
        }

        function updateFontFamily(fontValue) {
            document.documentElement.style.setProperty('--font-family', fontValue);
            localStorage.setItem(STORAGE_KEYS.Font, fontValue);
        }

        function loadFontSetting() {
            const storedFont = localStorage.getItem(STORAGE_KEYS.Font);
            if (storedFont) {
                document.documentElement.style.setProperty('--font-family', storedFont);
                document.getElementById('fontFamilySelect').value = storedFont;
            }
        }

        function adjustZoom(direction) {
            currentZoom += direction * 2;
            if (currentZoom < 10) currentZoom = 10;
            if (currentZoom > 36) currentZoom = 36;
            document.documentElement.style.setProperty('--font-size', currentZoom + 'px');
        }

        function applyColorChange(target, value) {
            const storedTheme = JSON.parse(localStorage.getItem(STORAGE_KEYS.Theme) || '{}');
            
            if (target === 'bg') {
                document.documentElement.style.setProperty('--bg-color', value);
                storedTheme.bg = value;
            } else if (target === 'text') {
                document.documentElement.style.setProperty('--text-color', value);
                storedTheme.text = value;
            } else if (target === 'panel') {
                document.documentElement.style.setProperty('--panel-bg', value);
                storedTheme.panel = value;
            }
            localStorage.setItem(STORAGE_KEYS.Theme, JSON.stringify(storedTheme));
        }

        function loadThemeSettings() {
            const storedTheme = JSON.parse(localStorage.getItem(STORAGE_KEYS.Theme) || '{}');
            if (storedTheme.bg) {
                document.documentElement.style.setProperty('--bg-color', storedTheme.bg);
                document.getElementById('bgColorPicker').value = storedTheme.bg;
            }
            if (storedTheme.text) {
                document.documentElement.style.setProperty('--text-color', storedTheme.text);
                document.getElementById('textColorPicker').value = storedTheme.text;
            }
            if (storedTheme.panel) {
                document.documentElement.style.setProperty('--panel-bg', storedTheme.panel);
                document.getElementById('panelColorPicker').value = storedTheme.panel;
            }
        }

        function setupContextMenu() {
            const targetCanvas = document.getElementById('editorContainer');
            
            targetCanvas.addEventListener('contextmenu', (e) => {
                if (window.getSelection().toString().trim().length > 0) {
                    e.preventDefault();
                    contextMenu.style.display = 'block';
                    contextMenu.style.left = `${e.clientX}px`;
                    contextMenu.style.top = `${e.clientY}px`;
                }
            });

            document.addEventListener('click', () => {
                contextMenu.style.display = 'none';
            });
        }

        function applyHighlight(colorValue) {
            const selection = window.getSelection();
            if (!selection.rangeCount || selection.toString().trim().length === 0) return;
            
            document.execCommand('styleWithCSS', false, true);
            document.execCommand('foreColor', false, colorValue);
            
            triggerAutosave();
        }

        function exportTXT() {
            let outputText = "";
            const timestamp = new Date().toISOString().slice(0,10);
            
            if (currentMode === 'A/V') {
                document.querySelectorAll('#avRowsWrapper .av-row').forEach((row, idx) => {
                    const cells = row.querySelectorAll('.av-cell');
                    outputText += `[SCENE SEQUENCE ${idx + 1}]\n`;
                    outputText += `VISUAL:\n${cells[0].innerText}\n\n`;
                    outputText += `AUDIO:\n${cells[1].innerText}\n`;
                    outputText += `==================================================\n\n`;
                });
            } else {
                outputText = editor.innerText;
            }

            const textBlob = new Blob([outputText], { type: 'text/plain;charset=utf-8' });
            const downloaderElement = document.createElement('a');
            downloaderElement.href = URL.createObjectURL(textBlob);
            downloaderElement.download = `DRAFT_ROOM_${currentMode.toUpperCase()}_${timestamp}.txt`;
            downloaderElement.click();
            URL.revokeObjectURL(downloaderElement.href);
        }

        function exportPDF() {
            window.print();
        }
    </script>
